<div (resized)="onResized($event)">
  <a href="javascript:;" (click)="sidebarService.toggleSidebar();" class="toggle-sidebar">
    <fa-icon [icon]="['fal', 'ellipsis-v']" size="lg"></fa-icon>
  </a>
  <div class="map-floors">
    <ul>
      <li>
        <span *ngIf="routingSource.finish && stateService.state.floor.level < routingSource.finish.properties.level">{{ getUpcomingFloorNumber('up') }}</span>
        <a href="javascript:;"
           [ngClass]="{'blinking': routingSource.finish && stateService.state.floor.level < routingSource.finish.properties.level}"
           (click)="onFloorChange('up')">
          <fa-icon [icon]="['fal', 'chevron-up']"></fa-icon>
        </a>
      </li>
      <li class="current-floor">{{ stateService.state.floor.level }}</li>
      <li>
        <span *ngIf="routingSource.finish && stateService.state.floor.level > routingSource.finish.properties.level">{{ getUpcomingFloorNumber('down') }}</span>
        <a href="javascript:;"
           [ngClass]="{'blinking': routingSource.finish && stateService.state.floor.level > routingSource.finish.properties.level}"
           (click)="onFloorChange('down')">
          <fa-icon [icon]="['fal', 'chevron-down']"></fa-icon>
        </a>
      </li>
    </ul>
  </div>
  <mgl-map
    *ngIf="!stateService.state.initializing"
    [style]="stateService.state.style"
    (load)="onLoad($event)"
  >
    <mgl-geojson-source
      id="my-location"
    >
      <mgl-feature
        *ngIf="showStartPoint"
        [geometry]="{
          'type': 'Point',
          'coordinates': [
            stateService.state.defaultLocation.coordinates[0],
            stateService.state.defaultLocation.coordinates[1]
          ]
       }"
        [properties]="{
          'level': stateService.state.defaultLocation.level
        }"
      ></mgl-feature>
    </mgl-geojson-source>
    <mgl-layer
      id="my-location-layer"
      type="symbol"
      source="my-location"
      [layout]="{
        'icon-image': 'pulsing-dot'
      }"
      [filter]="[
        'all',
        ['==', ['to-number', ['get','level']], this.stateService.state.floor.level]
      ]"
    ></mgl-layer>
    <ng-container *ngFor="let key of objectKeys(images)">
      <mgl-image
        [id]="key"
        [url]="images[key].uri"
      >
      </mgl-image>
    </ng-container>
  </mgl-map>
  <button mat-flat-button color="accent" (click)="onRouteCancel()" *ngIf="endPoi" class="route-cancel">
    Cancel Route <fa-icon [icon]="['fal', 'times']"></fa-icon>
  </button>
</div>
